name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm install -g npm@11.5.1
      - run: NODE_AUTH_TOKEN="" npm publish --access public --provenance
